<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — KIMT Bareilly</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0b3c91; --accent: #ffb703; --bg: #0f172a;
      --white: #fff; --text: #1e293b; --border: #e2e8f0;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background: var(--bg); min-height:100vh; display:flex; align-items:center; justify-content:center; }

    .bg-pattern {
      position:fixed; inset:0; background:
        radial-gradient(ellipse at 20% 50%, rgba(11,60,145,0.3) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(255,183,3,0.1) 0%, transparent 50%);
    }

    .login-card {
      position:relative; z-index:1;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%; max-width: 400px;
      text-align: center;
    }

    .shield-icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 32px; }

    .form-group { margin-bottom: 16px; text-align: left; }
    .form-group label { display:block; font-size:13px; font-weight:500; color:rgba(255,255,255,0.7); margin-bottom:6px; }
    .form-group input {
      width: 100%; padding: 12px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px; font-size: 14px;
      color: #fff; font-family: inherit; outline: none;
      transition: border 0.2s;
    }
    .form-group input:focus { border-color: var(--accent); background: rgba(255,255,255,0.12); }
    .form-group input::placeholder { color: rgba(255,255,255,0.3); }

    .btn-login {
      width: 100%; padding: 13px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      margin-top: 8px; transition: all 0.2s;
      letter-spacing: 0.02em;
    }
    .btn-login:hover { background: #1d4ed8; transform: translateY(-1px); }
    .btn-login:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

    .alert { padding:12px; border-radius:10px; font-size:13px; margin-bottom:16px; display:none; text-align:left; }
    .alert.error { background:rgba(239,68,68,0.2); border:1px solid rgba(239,68,68,0.4); color:#fca5a5; display:block; }

    .back-link { margin-top:20px; font-size:13px; color:rgba(255,255,255,0.4); }
    .back-link a { color:rgba(255,255,255,0.7); text-decoration:none; }
    .back-link a:hover { color:#fff; }

    .security-note { margin-top:24px; padding:12px; background:rgba(255,183,3,0.1); border:1px solid rgba(255,183,3,0.2); border-radius:10px; font-size:12px; color:rgba(255,255,255,0.5); }
  </style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="login-card">
  <div class="shield-icon">🔐</div>
  <h1>Admin Panel</h1>
  <p class="subtitle">KIMT Bareilly — Authorized Access Only</p>

  <div class="alert" id="alertBox"></div>

  <div class="form-group">
    <label>Admin Email</label>
    <input type="email" id="adminEmail" placeholder="admin@kimt.edu.in" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="adminPassword" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn-login" id="loginBtn" onclick="doLogin()">Login to Admin Panel</button>

  <div class="back-link">
    <a href="/">← Back to Main Website</a> &nbsp;|&nbsp; <a href="/student/">Student Portal</a>
  </div>

  <div class="security-note">
    🔒 This is a restricted area. All login attempts are logged.
  </div>
</div>

<script>
  const token = localStorage.getItem('adminToken');
  if (token) window.location.href = '/admin-panel/dashboard.html';

  async function doLogin() {
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    const alertEl = document.getElementById('alertBox');
    alertEl.className = 'alert';

    if (!email || !password) {
      alertEl.textContent = 'Email aur password dono chahiye.';
      alertEl.className = 'alert error'; return;
    }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Verifying...';

    try {
      const res = await fetch('/api/auth/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        alertEl.textContent = data.error || 'Invalid credentials.';
        alertEl.className = 'alert error'; return;
      }

      localStorage.setItem('adminToken', data.token);
      localStorage.setItem('adminInfo', JSON.stringify(data.admin));
      window.location.href = '/admin-panel/dashboard.html';
    } catch (err) {
      alertEl.textContent = 'Server se connect nahi ho pa raha. Try again.';
      alertEl.className = 'alert error';
    } finally {
      btn.disabled = false; btn.textContent = 'Login to Admin Panel';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
