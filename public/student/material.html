<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Material — KIMT Student Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{--primary:#0b3c91;--accent:#ffb703;--bg:#f0f4ff;--white:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    .topbar{background:var(--primary);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:14px;}
    .topbar a{color:rgba(255,255,255,0.7);text-decoration:none;font-size:13px;}
    .topbar h1{font-size:16px;font-weight:600;flex:1;}
    .container{max-width:960px;margin:32px auto;padding:0 20px;}
    .card{background:var(--white);border-radius:14px;padding:24px;box-shadow:0 2px 12px rgba(11,60,145,0.07);margin-bottom:20px;}

    /* Stats */
    .stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;}
    .stat-box{background:var(--white);border-radius:12px;padding:14px;text-align:center;box-shadow:0 2px 10px rgba(11,60,145,0.07);cursor:pointer;transition:.2s;border:2px solid transparent;}
    .stat-box:hover{border-color:var(--primary);}
    .stat-box.active{border-color:var(--primary);background:#f0f4ff;}
    .stat-icon{font-size:22px;margin-bottom:6px;}
    .stat-num{font-size:20px;font-weight:700;color:var(--primary);}
    .stat-label{font-size:10px;color:var(--muted);margin-top:2px;font-weight:500;}

    /* Controls */
    .controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
    .search-wrap{flex:1;min-width:180px;position:relative;}
    .search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);}
    .search-wrap input{width:100%;padding:10px 12px 10px 36px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;outline:none;background:#f8fafc;}
    .search-wrap input:focus{border-color:var(--primary);background:#fff;}
    select{padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;color:var(--text);background:#f8fafc;outline:none;}

    /* Material grid */
    .material-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
    .material-card{border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:.2s;background:var(--white);}
    .material-card:hover{box-shadow:0 6px 20px rgba(11,60,145,0.12);transform:translateY(-2px);}
    .material-top{padding:16px;display:flex;align-items:flex-start;gap:12px;}
    .material-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .icon-pdf{background:#fee2e2;color:#dc2626;}
    .icon-video{background:#dbeafe;color:#2563eb;}
    .icon-link{background:#dcfce7;color:#16a34a;}
    .icon-notes{background:#fef9c3;color:#a16207;}
    .icon-assignment{background:#ede9fe;color:#7c3aed;}
    .material-info{flex:1;}
    .material-title{font-size:13px;font-weight:700;line-height:1.4;margin-bottom:4px;}
    .material-sub{font-size:11px;color:var(--muted);}
    .material-desc{font-size:12px;color:var(--text);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .material-footer{padding:10px 16px;border-top:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;}
    .material-date{font-size:11px;color:var(--muted);}
    .open-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;background:var(--primary);color:#fff;border-radius:8px;font-size:12px;font-weight:500;text-decoration:none;transition:.2s;}
    .open-btn:hover{background:#083173;}

    .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
    .badge.pdf{background:#fee2e2;color:#dc2626;}
    .badge.video{background:#dbeafe;color:#2563eb;}
    .badge.link{background:#dcfce7;color:#16a34a;}
    .badge.notes{background:#fef9c3;color:#a16207;}
    .badge.assignment{background:#ede9fe;color:#7c3aed;}

    .empty-state{text-align:center;padding:56px 24px;color:var(--muted);grid-column:1/-1;}
    .empty-state i{font-size:52px;margin-bottom:14px;opacity:.3;}
    .empty-state h3{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--text);}
    .empty-state p{font-size:13px;}

    .count-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
    .count-bar span{font-size:13px;color:var(--muted);}

    @media(max-width:600px){
      .stats-row{grid-template-columns:repeat(3,1fr);}
      .material-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="/student/dashboard.html"><i class="fas fa-arrow-left"></i> Dashboard</a>
  <h1><i class="fas fa-book-open" style="margin-right:8px"></i>Study Material</h1>
</div>

<div class="container">

  <!-- TYPE STATS -->
  <div class="stats-row">
    <div class="stat-box active" onclick="setType('',this)" id="tab-all">
      <div class="stat-icon">📚</div>
      <div class="stat-num" id="count-all">0</div>
      <div class="stat-label">All</div>
    </div>
    <div class="stat-box" onclick="setType('PDF',this)">
      <div class="stat-icon">📄</div>
      <div class="stat-num" id="count-pdf">0</div>
      <div class="stat-label">PDFs</div>
    </div>
    <div class="stat-box" onclick="setType('Video',this)">
      <div class="stat-icon">🎥</div>
      <div class="stat-num" id="count-video">0</div>
      <div class="stat-label">Videos</div>
    </div>
    <div class="stat-box" onclick="setType('Notes',this)">
      <div class="stat-icon">📝</div>
      <div class="stat-num" id="count-notes">0</div>
      <div class="stat-label">Notes</div>
    </div>
    <div class="stat-box" onclick="setType('Assignment',this)">
      <div class="stat-icon">📋</div>
      <div class="stat-num" id="count-assign">0</div>
      <div class="stat-label">Assignments</div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="search-wrap">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Title ya subject se search karo..." oninput="applyFilter()">
    </div>
    <select id="filterSubject" onchange="applyFilter()">
      <option value="">All Subjects</option>
    </select>
    <select id="sortBy" onchange="applyFilter()">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
      <option value="title">A–Z</option>
    </select>
  </div>

  <!-- MATERIALS -->
  <div class="count-bar">
    <span>Showing <strong id="materialCount">0</strong> items</span>
  </div>
  <div class="material-grid" id="materialGrid">
    <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><h3>Loading...</h3></div>
  </div>

</div>

<script>
const token = localStorage.getItem('studentToken');
if (!token) window.location.href = '/student/index.html';
const headers = { 'Authorization': 'Bearer ' + token };

let allMaterials = [];
let activeType = '';

const typeIconMap = {
  PDF: { cls: 'icon-pdf', ico: 'fa-file-pdf' },
  Video: { cls: 'icon-video', ico: 'fa-video' },
  Link: { cls: 'icon-link', ico: 'fa-link' },
  Notes: { cls: 'icon-notes', ico: 'fa-sticky-note' },
  Assignment: { cls: 'icon-assignment', ico: 'fa-tasks' }
};

async function loadMaterials() {
  try {
    const res = await fetch('/api/student/materials', { headers });
    const data = await res.json();
    allMaterials = data.materials || [];

    // Count by type
    document.getElementById('count-all').textContent = allMaterials.length;
    document.getElementById('count-pdf').textContent = allMaterials.filter(m => m.type === 'PDF').length;
    document.getElementById('count-video').textContent = allMaterials.filter(m => m.type === 'Video').length;
    document.getElementById('count-notes').textContent = allMaterials.filter(m => m.type === 'Notes').length;
    document.getElementById('count-assign').textContent = allMaterials.filter(m => m.type === 'Assignment').length;

    // Subject dropdown
    const subjects = [...new Set(allMaterials.map(m => m.subject))].sort();
    const sel = document.getElementById('filterSubject');
    subjects.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o); });

    applyFilter();
  } catch (err) {
    document.getElementById('materialGrid').innerHTML = `<div class="empty-state">
      <i class="fas fa-exclamation-circle"></i><h3>Load nahi hua</h3><p>Material fetch karne mein error aayi.</p>
    </div>`;
  }
}

function setType(type, el) {
  activeType = type;
  document.querySelectorAll('.stat-box').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const subj = document.getElementById('filterSubject').value;
  const sort = document.getElementById('sortBy').value;

  let filtered = allMaterials;
  if (activeType) filtered = filtered.filter(m => m.type === activeType);
  if (subj) filtered = filtered.filter(m => m.subject === subj);
  if (q) filtered = filtered.filter(m =>
    m.title.toLowerCase().includes(q) ||
    m.subject.toLowerCase().includes(q) ||
    (m.description || '').toLowerCase().includes(q)
  );

  if (sort === 'newest') filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  else if (sort === 'oldest') filtered.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
  else if (sort === 'title') filtered.sort((a,b) => a.title.localeCompare(b.title));

  document.getElementById('materialCount').textContent = filtered.length;
  renderMaterials(filtered);
}

function renderMaterials(materials) {
  const el = document.getElementById('materialGrid');
  if (!materials.length) {
    el.innerHTML = `<div class="empty-state">
      <i class="fas fa-book-open"></i>
      <h3>Koi material nahi mila</h3>
      <p>Filter change karo ya baad mein check karo</p>
    </div>`; return;
  }

  el.innerHTML = materials.map(m => {
    const t = m.type || 'PDF';
    const { cls, ico } = typeIconMap[t] || typeIconMap.PDF;
    const href = m.fileUrl ? `/uploads/materials/${m.fileUrl}` : (m.externalLink || '#');
    const date = new Date(m.createdAt).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });

    return `<div class="material-card">
      <div class="material-top">
        <div class="material-icon ${cls}"><i class="fas ${ico}"></i></div>
        <div class="material-info">
          <div class="material-title">${m.title}</div>
          <div class="material-sub">
            <span class="badge ${t.toLowerCase()}">${t}</span>
            &nbsp;${m.subject} • Sem ${m.semester}
          </div>
          ${m.description ? `<div class="material-desc">${m.description}</div>` : ''}
        </div>
      </div>
      <div class="material-footer">
        <span class="material-date"><i class="fas fa-calendar" style="margin-right:4px"></i>${date}</span>
        <a href="${href}" target="_blank" class="open-btn">
          <i class="fas fa-${t === 'Video' ? 'play' : t === 'Link' ? 'external-link-alt' : 'download'}"></i>
          ${t === 'Video' ? 'Watch' : t === 'Link' ? 'Open' : 'Download'}
        </a>
      </div>
    </div>`;
  }).join('');
}

loadMaterials();
</script>
</body>
</html>
